<!DOCTYPE html>
<html lang="es">
<head>
   
    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            margin: 0;
            color: white;
        }

        nav{
            background: #111;
            padding: 15px;
            text-align: center;
        }

        nav a{
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover{
            text-decoration: underline;
        }

        .container{
            padding: 40px 20px;
            text-align: center;
        }

        .card{
            background: white;
            color: black;
            padding: 30px;
            border-radius: 15px;
            max-width: 600px;
            margin: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1{
            margin-top: 0;
        }

        .btn{
            background: #25D366;
            color: white;
            padding: 15px 25px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            display: inline-block;
            margin-top: 20px;
        }

        .btn:hover{
            background: #1ebe5d;
        }

        ul{
            list-style: none;
            padding: 0;
        }

        li{
            margin: 10px 0;
        }
    </style>
</head>

<body>

    <nav>
        <a href="/">Inicio</a>
        <a href="/servicios">Servicios</a>
        <a href="/contacto">Contacto</a>
    </nav>

    <div class="container">
        {% block contenido %}
        {% endblock %}
    </div>

</body>
</html>
